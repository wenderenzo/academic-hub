<!doctype html>
<html lang="en">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style/style.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="script/script.js" defer></script>
    <title>Document</title>
  </head>
  <body>
    <header class="app-header">
      <div class="brand">
        <h1>Academic Hub</h1>
        <p>Sua plataforma de curadoria e revisão espaçada</p>
      </div>
      <div class="header-actions">
        <button
          id="themeToggle"
          class="btn-primary"
          aria-label="Alternar Tema Escuro"
        >
          Modo Claro
        </button>
      </div>
    </header>
    <main class="container">
      <section class="search-section" aria-label="Pesquisa">
        <div class="search-container">
          <input
            type="text"
            placeholder="Buscar por assunsto"
            aria-label="Campo de pesquisa"
          />
        </div>
      </section>
      <article class="flashcard">
        <span class="flashcard-category"> Arquitetura CSS </span>
        <h2 class="flashcard-question">Qual é a função do Flexbox no CSS?</h2>
        <button class="btn-primary" aria-label="Mostrar resposta">
          Mostrar Resposta
        </button>
      </article>
    </main>
  </body>
</html>
